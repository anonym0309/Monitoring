<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Terrarium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Monitoring Kondisi Terrarium</h1>

    <button id="tema-btn" class="btn-tema">Mode Gelap 🌙</button>

    <div class="sensor-container">
        <div class="card">
            <h2>Suhu Udara</h2>
            <div id="gauge-suhu" style="width:100%; height:140px;"></div> 
            <p><span id="suhu-val">0</span> °C</p>
        </div>

        <div class="card">
            <h2>Kelembapan Udara</h2>
            <div id="gauge-lembab-udara" style="width:100%; height:140px;"></div>
            <p><span id="lembab-udara-val">0</span> %</p>
        </div>

        <div class="card">
            <h2>Kelembapan Tanah</h2>
            <div id="gauge-lembab-tanah" style="width:100%; height:140px;"></div>
            <p><span id="lembab-tanah-val">0</span> %</p>
        </div>

        <div class="card">
            <h2>Intensitas Cahaya</h2>
            <div id="gauge-cahaya" style="width:100%; height:140px;"></div>
            <p><span id="cahaya-val">0</span> Lux</p>
        </div>
       <div style="margin-top: 30px; margin-bottom: 50px;">
        <a href="https://thingspeak.mathworks.com/channels/3004157" target="_blank" style="text-decoration: none;">
            <button class="btn-public">
                📊 Lihat Grafik Publik ThingSpeak
            </button>
        </a>
    </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.6.1/justgage.min.js"></script>
    
    <script src="script.js"></script>
</body>

</html>
